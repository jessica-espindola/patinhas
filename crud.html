									<form method="post" action="#">

											</div>

											<div class="col-6 col-12-xsmall">

											<div class="col-6 col-12-xsmall">
												<input type="password" name="demo-name" id="demo-name" value="" placeholder="Senha" />
											</div>
											<!-- Repetir a Senha -->
											<div class="col-6 col-12-xsmall">
												<input type="password" name="demo-name" id="demo-name" value="" placeholder="Repetir a Senha" />
											</div>
